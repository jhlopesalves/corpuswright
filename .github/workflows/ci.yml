name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-core:
    name: Rust core (corpusaid-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run clippy
        run: cargo clippy -p corpusaid-core --all-targets -- -D warnings
      - name: Install PDFium for tests
        run: |
          mkdir -p apps/desktop/src-tauri/resources/ocr
          curl -L -o /tmp/pdfium-linux-x64.tgz https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-linux-x64.tgz
          tar -xzf /tmp/pdfium-linux-x64.tgz -C /tmp
          cp /tmp/lib/libpdfium.so apps/desktop/src-tauri/resources/ocr/libpdfium.so
      - name: Run tests
        run: cargo test -p corpusaid-core
      - name: Check generated TypeScript bindings are up to date
        run: |
          echo "::group::Regenerating TypeScript bindings"
          cargo run -p corpusaid-core --example export_ts
          echo "::endgroup::"

          echo "::group::Checking for stale generated files"
          if [ -n "$(git status --porcelain -- apps/desktop/src/generated/)" ]; then
            echo "ERROR: Generated TypeScript bindings are out of date."
            echo ""
            echo "Run the following command locally and commit the updated files:"
            echo "  cargo run -p corpusaid-core --example export_ts"
            echo ""
            echo "Changed generated files:"
            git status --short -- apps/desktop/src/generated/
            echo ""
            echo "Diff:"
            git diff -- apps/desktop/src/generated/
            exit 1
          fi
          echo "Generated TypeScript bindings are up to date."
          echo "::endgroup::"

  tauri-check:
    name: Tauri check (corpusaid-desktop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri v2 Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libxdo-dev libssl-dev build-essential libayatana-appindicator3-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check Tauri crate
        run: cargo check -p corpusaid-desktop --all-targets
      - name: Run clippy on Tauri crate
        run: cargo clippy -p corpusaid-desktop --all-targets -- -D warnings

  frontend:
    name: Frontend (Vite + TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci
      - name: Build frontend
        working-directory: apps/desktop
        run: npm run build
